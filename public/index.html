<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horse Racing Selection & Bankroll Tracker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="nav">
        <a href="#/today" class="nav-brand" aria-label="Go to Today">🏇 Racing App</a>
        <div class="nav-user">
            <select id="user-select" class="nav-user-select" aria-label="Active user profile"></select>
            <button id="create-user-btn" class="nav-user-add" type="button" title="Create user profile">+</button>
        </div>
        <div class="nav-bankroll" id="nav-bankroll">$0.00</div>
        <button class="nav-toggle" id="nav-toggle">☰</button>
        <div class="nav-links" id="nav-links">
            <a href="#/home" class="nav-link" data-route="home">Home</a>
            <a href="#/results" class="nav-link" data-route="results">Results</a>
            <a href="#/bankroll" class="nav-link" data-route="bankroll">Bankroll</a>
            <a href="#/logs" class="nav-link" data-route="logs">Logs</a>
            <a href="#/settings" class="nav-link" data-route="settings">Settings</a>
            <a href="#/horses" class="nav-link" data-route="horses">Horse Profiles</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main" id="app">
        <!-- Content loaded dynamically -->
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p class="disclaimer">⚠️ Gambling involves risk. This app provides estimates, not guarantees. Please gamble responsibly.</p>
    </footer>

    <!-- Toast notifications -->
    <div class="toast-container" id="toast-container"></div>

    <script src="js/app.js"></script>
</body>
</html>
